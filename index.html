<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>timeline_valerie</title>
    <link rel="stylesheet" href="./css/all.css">

<body>
    <div class="container">

                </div>
            </div>
            <div class="timeline-container left wow fadeInLeft">
                <div class="timeline-item">
                    <div class="event-title">接案平台前端介面</div>

                    <img src="./img/plus.png" alt="" class="timeline-image">
                </div>
            </div>
            <div class="timeline-container right wow fadeInLeft">

                    <img src="./img/101.png" alt="" class="timeline-image">
                </div>
            </div>
            <div class="timeline-container left wow fadeInLeft">
                <div class="timeline-item">
                    <div class="event-title">時間軸個人網頁</div>
                    <div class="timeline-date">2025年2月10日</div>
                    <div class="timeline-text">Hellow World !!!!!</div>
                    <img src="./img/hellow.jpg" alt="" class="timeline-image">
                </div>
            </div>
        </div>
    </div>
    
    <script src="./js/jquery-3.7.1.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/WOW.js"></script>
    <script src="./js/index.js"></script>
</body>
</html>
